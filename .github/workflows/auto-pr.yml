name: Auto Pull Request

on:
  push:
    branches-ignore: [main]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ github.ref_name }}
          title: "PR: ${{ github.ref_name }}"
          body: |
            **Automated PR from branch `${{ github.ref_name }}`**

            Alterações enviadas por @${{ github.actor }}.
          delete-branch: true

      - name: PR Output
        if: steps.pr.outputs.pull-request-number
        run: |
          echo "Pull Request #${{ steps.pr.outputs.pull-request-number }} created!"
